<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexÜbung</title>
    <link rel="stylesheet" href="css/reset.css">
    <style>
        .blue {
            position: relative;
            width: 760px;
            height: 300px;
            background-color: rgb(90, 148, 201);
            margin: 20px;
            margin-bottom: 50px;
        }

        .braun {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: rgb(107, 53, 22);
            right: 0;
            bottom: 0;
        }

        .violet {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: rgb(155, 94, 201);
            right: 0;
            top: 0;
        }

        .yellow {
            width: 100%;
            height: 100px;
            background-color: yellow;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .green {
            width: 30px;
            height: 30px;
            background-color: rgb(21, 239, 39);
            margin: 60px;
        }
    </style>
</head>

<body>
    <div class="blue">
        <div class="braun"></div>
    </div>
    <div class="violet"></div>
    <div class="yellow">
        <div class="green"></div>
        <div class="green"></div>
        <div class="green"></div>
        <div class="green"></div>
    </div>
</body>

</html>
