<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .eins {
            background-color: green;
            height: 400px;
            display: flex;
            align-items: baseline;
            justify-content: center;

        }
        .box {
            position: relative;
            width: 100px;
            height: 100px;
            background-color: red;
            margin: 5px;
        }
        .box2 {
            position: absolute;
            background-color: rgb(132, 0, 255);
            width: 60px;
            height: 60px;
            right: 0;
            bottom: 0;
            /* top,left,right,bottom*/
        }
        .box3 {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100px;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div class="box3"></div>
    <div class="box2"></div>
    <div class="eins">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box">
            <div class="box2"></div>
        </div>
    
    </div>
</body>
</html>
