<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    // Erstelle eine Zufallszahl zwischen 5 und 10 
    // Wenn der Wert 10 ist gib aus Ten 
    // Wenn der Wert 9 ist gib aus Nine 
    // Wenn der Wert 8 ist gib aus Eight 
    // etc. 
    let value = 10;
    switch (value) {
        case 10:
            console.log("Ten");
            break;
        case 9:
            console.log("Nine");
            break;
        case 8:
            console.log("Eight");
            break;
        case 7:
            console.log("Seven");
            break;
        case 6:
            console.log("Six");
            break;
        default:
            console.log("Unbekannter Wert");
    }

    </script>
</body>
</html>
