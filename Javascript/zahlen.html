<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        console.log("Hallo"); 
        console.log("Tolle Sache"); 
        // Variablen 
        let a = 7; 
        let b = 8; 
        let c = 10; 
        // Berechne folgendes und gib das Eregebnis über console.log aus 
        // a + b + c 
        let summe = a+b+c
        console.log(summe); 
        // (a + b) / c 
        console.log((a + b) / c); 
        // c -a + b 
        // a + b + c * 3 
        // (a + b + c)/4 
        // Ändere die Variablen auf folgende Werte 
        // a = 3 
        // b = a + 3 
        // c = c -3 
        // gib die neuen Werte der Variablen aus 

        let name = "Muhammad Magomadov"
        var meinname = "Muhammad Magomadov"
        console.log(name);
        console.log(meinname);


        // AUFGABE 3

        // Erstelle eine Variable banana mit dem Wert "Banane" 
        let banana = "Banane";
        // Erstelle eine Variable apple mit dem Wert "Apple" 
        let apple = "Apple";
    

        // Erstelle eine Variable bananaPricePerKilo mit dem Wert 2.14 
        let bananaPricePerKilo = 2.14;
        // Erstelle eine Variable applePricePerKilo mit dem Wert 3.43 
        let applePricePerKilo = 3.43;
        
        // Ein Apfel hat durchschnittlich ein Gewicht von 0.34 Kilo 
        let appleWeightPerKilo = 0.34;

        // Eine Banane hat durchschnittlich ein Gewicht von 0.22 Kilo 
        let bananaWeightPerKilo = 0.22;
        
        // Gib folgendes aus: Anzahl Bananen/Äpfel pro Kilo, Preis pro Banane/Apfel 
        console.log("Anzahl Bananen pro Kilo:", 1 / bananaWeightPerKilo);
        console.log("Preis pro Banane:", bananaPricePerKilo * bananaWeightPerKilo);
        console.log("Anzahl Äpfel pro Kilo:", 1 / appleWeightPerKilo);
        console.log("Preis pro Apfel:", applePricePerKilo * appleWeightPerKilo);

        // Preis von 8 Äpfeln 
        console.log("Preis von 8 Äpfeln:", 8 * applePricePerKilo * appleWeightPerKilo);
        // Preis von 17 Bananen 
        console.log("Preis von 17 Bananen:", 17 * bananaPricePerKilo * bananaWeightPerKilo);
        // Preis von 1 Tonne Äpfel 
        console.log("Preis von 1 Tonne Äpfel:", 1000 * applePricePerKilo);
        // Preis von 1 Tonne Bananen 
        console.log("Preis von 1 Tonne Bananen:", 1000 * bananaPricePerKilo);



        // Zähle von 7 bis 45 

        let zaehler = 7;
        while (zaehler < 46) {
            console.log(zaehler);
            zaehler = zaehler + 1;
        }
        for (zaehler = 7; zaehler < 46; zaehler++) {
            console.log(zaehler);
        }

        // Zähle von 9 bis 99 

        zaehler = 9;
        while (zaehler < 100) {
            console.log(zaehler);
            zaehler = zaehler + 1;
        }
        for (zaehler = 9; zaehler < 100; zaehler++) {
            console.log(zaehler);
        }

        // Zähle rückwärts von 10 bis 0 

        zaehler = 10;
        while (zaehler > 0) {
            console.log(zaehler);
            zaehler = zaehler - 1;
        }
        for (zaehler = 10; zaehler > 0; zaehler--) {
            console.log(zaehler);
        }

        // Zähle rückwärts von 1234 bis 1207 

        zaehler = 1234;
        while (zaehler > 1206) {
            console.log(zaehler);
            zaehler = zaehler - 1;
        }
        for (zaehler = 1234; zaehler > 1206; zaehler--) {
            console.log(zaehler);
        }

        // Gib Deinen Namen genau 8 mal aus 
        for (let i = 0; i < 8; i++) {
            console.log(name);
        }
        // Zähle von 0 auf 10, dann gib Deinen Namen aus, dann zähle  von 10 auf 0 
        for (let i = 0; i < 11; i++) {
            console.log(i);
        }
        console.log(name);
        for (let i = 10; i >= 0; i--) {
            console.log(i);
        }

    </script>
</body>
</html>
